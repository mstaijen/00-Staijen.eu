name: Deploy to Strato

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.strato.com
          username: staijen.eu
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "."
          target: "/staijen"